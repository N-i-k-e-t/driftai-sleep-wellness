<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA & Mobile-Only App -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sleepzy" />
    <meta name="application-name" content="Sleepzy" />
    <meta name="theme-color" content="#0f0a2e" />
    <meta name="background-color" content="#0f0a2e" />

    <!-- SEO -->
    <meta name="description" content="Sleepzy - Your AI Sleep & Wellness Companion. A mobile app by Algeina Technology LLP (ANTS Network)." />
    <meta name="keywords" content="sleep tracker, AI sleep, wellness app, sleep analytics, ambient sounds, PWA" />
    <meta name="author" content="Algeina Technology LLP" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sleepzy.andsnetwork.com/" />
    <meta property="og:title" content="Sleepzy - Sleep Smarter with AI" />
    <meta property="og:description" content="Your personal AI companion for better sleep and wellness. Track sleep, play ambient sounds, get AI insights." />
    <meta property="og:image" content="https://sleepzy.andsnetwork.com/og-image.png" />
    <meta property="og:site_name" content="Sleepzy" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sleepzy - Sleep Smarter with AI" />
    <meta name="twitter:description" content="Your personal AI companion for better sleep and wellness." />
    <meta name="twitter:image" content="https://sleepzy.andsnetwork.com/og-image.png" />

    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/moon.svg" />
    <link rel="apple-touch-icon" href="/moon.svg" />

    <title>Sleepzy - Sleep Better</title>
  </head>
  <body class="bg-[#0f0a2e]">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
